<!-- templates/login.html -->

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }

      .login-container {
        width: 350px;
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .login-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      .input-box {
        margin-bottom: 20px;
      }

      .input-box input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
      }

      .input-box input:focus {
        border-color: #4facfe;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #008cdd;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Login</h2>

      <form method="POST">
        <div class="input-box">
          <input
            type="email"
            name="useremail"
            placeholder="Enter Email"
            required
          />
        </div>
        <div class="input-box">
          <input
            type="password"
            name="userpassword"
            placeholder="Enter Password"
            required
          />
        </div>
        <button type="submit">Login</button>
      </form>
      <a href="{{ url_for('forgot') }}">forgot password</a>
    </div>
  </body>
</html>
