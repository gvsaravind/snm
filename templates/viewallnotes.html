<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View All Notes</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f2f2f2;
        }

        h1{
            text-align:center;
            margin-top:30px;
            color:#333;
        }

        table{
            width:85%;
            margin:auto;
            margin-top:40px;
            border-collapse:collapse;
            background:white;
            box-shadow:0px 0px 10px gray;
        }

        th{
            background:#333;
            color:white;
            padding:15px;
        }

        td{
            padding:12px;
            text-align:center;
            border:1px solid #ccc;
        }

        tr:hover{
            background:#f9f9f9;
        }

        a{
            text-decoration:none;
            color:white;
            padding:8px 14px;
            border-radius:5px;
            font-size:14px;
        }

        .view{
            background:blue;
        }

        .update{
            background:orange;
        }

        .delete{
            background:red;
        }

        .view:hover{
            background:darkblue;
        }

        .update:hover{
            background:darkorange;
        }

        .delete:hover{
            background:darkred;
        }

    </style>

</head>
<body>

    <h1>View All Notes</h1>

    <table>

        <thead>

            <tr>
                <th>Notes ID</th>
                <th>Title</th>
                <th>Created At</th>
                <th>View</th>
                <th>Update</th>
                <th>Delete</th>
            </tr>

        </thead>

        <tbody>

{% for note in allnotesdata %}

            <tr>

<td>{{ note[0] }}</td>
<td>{{ note[1] }}</td>
<td>{{ note[2] }}</td>

                <td>
                    <a href="{{ url_for('viewnotes', nid=note[0]) }}" class="view">View</a>
                </td>

                <td>
                    <a href="{{ url_for('updatenotes', nid=note[0]) }}" class="update">Update</a>
                </td>

                <td>
                    <a href="{{ url_for('deletenotes', nid=note[0]) }}" class="delete">Delete</a>
                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</body>
</html>
