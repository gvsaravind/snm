<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f0f2f5;
        }

        .container{
            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .container h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box label{
            display:block;
            margin-bottom:5px;
            color:#555;
        }

        .input-box input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
        }

        .btn{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .btn:hover{
            background:#0056b3;
        }

        .back{
            text-align:center;
            margin-top:15px;
        }

        .back a{
            text-decoration:none;
            color:#007bff;
        }

    </style>

</head>
<body>

    <div class="container">

        <h2>Forgot Password</h2>

        <form method="POST">

            <div class="input-box">
                <label>Email Address</label>
                <input type="email" name="useremail" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn">
                Send OTP
            </button>

        </form>

        <div class="back">
            <a href="{{url_for('login')}}">Back to Login</a>
        </div>

    </div>

</body>
</html>
